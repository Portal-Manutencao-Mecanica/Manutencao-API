# Production HTTPS profile
server.port=${SERVER_PORT:8443}
server.ssl.enabled=true
server.ssl.key-store=${SERVER_SSL_KEY_STORE}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${SERVER_SSL_KEY_ALIAS:portal-manutencao}
server.forward-headers-strategy=framework

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:900}
app.jwt.refresh-expiration-seconds=${REFRESH_TOKEN_EXPIRATION:2592000}

app.security.login-rate-limit.capacity=${LOGIN_RATE_LIMIT_CAPACITY:5}
app.security.login-rate-limit.refill-seconds=${LOGIN_RATE_LIMIT_REFILL_SECONDS:60}

spring.jpa.show-sql=false
logging.level.org.springframework.security=WARN
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
