# Local development profile
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:900}
app.jwt.refresh-expiration-seconds=${REFRESH_TOKEN_EXPIRATION:2592000}

app.security.login-rate-limit.capacity=2
app.security.login-rate-limit.refill-seconds=60

spring.jpa.show-sql=true
logging.level.org.springframework.security=INFO
